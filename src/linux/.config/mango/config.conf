animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.3
zoom_end_ratio=0.7
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=400
animation_curve_open=0.46,1.0,0.29,1.1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.58,0.98,0.58,0.98
animation_curve_opafadein=0.46,1.0,0.29,1

# Border styling
borderpx=2
border_radius=6
focuscolor=0x5FEDD6ff
bordercolor=0x3D3D3Dff

allow_tearing=1

# Windows should always stay visible when not focused
focused_opacity=1.0
unfocused_opacity=1.0

enable_hotarea=false

# Disable focus following the mouse
sloppyfocus=0

new_is_master=0

syncobj_enable=1

# Don't float windows when dragged to another workspace / monitor
drag_tile_to_tile=1

# sub config load
source=./env.conf
source=./bind.conf
source=./rule.conf
source=./monitor.conf

# run autostart
exec-once=~/.config/mango/autostart.sh
