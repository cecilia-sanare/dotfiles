
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,highrr,auto,auto

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = thunar
$browser = zen-browser
$menu = rofi -show drun
$calc = rofi -show calc -modi calc -no-show-match -no-sort

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
exec-once = systemctl --user start hyprpolkitagent
exec-once = uwsm app -- swww-daemon -f xrgb
exec-once = uwsm app -- swww img "$(find ~/Pictures/wallpapers/ -type f | shuf -n 1 | xargs)"
exec-once = uwsm app -- waybar
exec-once = uwsm app -- 1password --silent

exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita-dark"   # for GTK3 apps
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

source = ~/.config/hypr/style.conf # Load look and feel settings

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, X, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, C, exec, $calc
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, $browser
bind = $mainMod, F, fullscreen

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Screenshots
bind = , PRINT, exec, hyprshot -m region -z --clipboard-only
# Screenshot a monitor
# bind = , PRINT, exec, hyprshot -m output
# Screenshot a region
# bind = $shiftMod, PRINT, exec, hyprshot -m region

# Mouse Keys
# binde = , KP_Up, exec, ydotool mousemove --relative -- 0 -1
# binde = , KP_Down, exec, ydotool mousemove --relative -- 0 1
# binde = , KP_Left, exec, ydotool mousemove --relative -- -1 0
# binde = , KP_Right, exec, ydotool mousemove --relative -- 1 0
# bind  = , KP_Begin, exec, ydotool click 0xC0       # left  click
# bind  = , KP_Begin, exec, ydotool click 0xC0       # left  click
# bind  = $mainMod ctrl, i, exec, ydotool click 0xC2       # middle click
# bind  = $mainMod ctrl, o, exec, ydotool click 0xC1       # right

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, Control_L, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, ALT_L, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppress_event maximize match:class .*

windowrule {
    name = media-viewer-float
    match:title = ^(Media viewer)$

    float = 1
}

windowrule {
    name = volume-float
    match:class = org.pulseaudio.pavucontrol
    match:title = ^Volume Control$

    float = 1
}

windowrule {
    name = pip-float
    match:title = ^(Picture-in-Picture)$

    float = 1
    # keep_aspect_ratio = 1
    render_unfocused = 1
}

windowrule {
    name = steam-popups
    match:class = steam
    match:title = negative:^Steam$

    float = 1
}

windowrule {
    name = steam-tile-games
    match:class = ^steam_app_\d+$

    tile = 1
    float = 0
}

windowrule {
    name = wofi-force-focus
    match:class = wofi

    stay_focused = 1
}

windowrule {
    name = thunar-force-focus
    match:class = ^[Tt]hunar$
    match:title = ^(Rename.*)

    stay_focused = 1
}

windowrule {
    name = thunar-float-popups
    match:class = ^[Tt]hunar$
    match:title = ^(Rename.*|Copying|File Operation Progress)

    float = 1
}

windowrule {
    name = qbittorrent-popups
    match:class = org.qbittorrent.qBittorrent
    match:title = negative:^qBittorrent.*

    float = 1
}

windowrule {
    name = mkvtoolnix-popups
    match:class = org.bunkus.mkvtoolnix-gui
    match:title = ^(Edit language)$

    float = 1
}

windowrule {
    name = vlc-popups
    match:class = vlc
    match:title = negative:^.*VLC media player$

    float = 1
}

windowrule {
    name = runelite-tooltips
    match:class = ^(net-runelite-client-RuneLite)$
    match:title = ^win(.*)$

    no_initial_focus = 1
}

# Not a fan of this since it kinda hits everything that floats, but oh well
windowrule {
    name = spacestation-14-tooltips
    match:float = 1

    no_initial_focus = 1
}

windowrule {
    name = jetbrains-rider-force-focus
    match:class = jetbrains-rider
    match:title = ^(Rename.*)

    stay_focused = 1
}

# fix tooltips (always have a title of `win.<id>`)
windowrule {
    name = fix-jetbrains-tooltips
    match:class = ^(.*jetbrains.*)$
    match:title = ^(win.*)$

    no_initial_focus = 1
    no_focus = 1
}

# fix tab dragging (always have a single space character as their title)
windowrule {
    name = fix-jetbrains-tab-dragging
    match:class = ^(.*jetbrains.*)$
    match:title = ^\\s$

    no_initial_focus = 1
    no_focus = 1
}

# fix tab dragging (always have a single space character as their title)
windowrule {
    name = fix-jetbrains-tab-dragging
    match:class = ^(.*jetbrains.*)$
    match:title = ^\\s$

    no_initial_focus = 1
    no_focus = 1
}

windowrule {
    name = polkitagent-force-focus
    match:class = hyprpolkitagent

    stay_focused = 1
    no_initial_focus = 0
}
